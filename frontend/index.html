<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskMyNotes</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-blue-600 text-white py-6 shadow-md">
    <div class="max-w-3xl mx-auto px-4">
      <h1 class="text-3xl font-bold">AskMyNotes</h1>
      <p class="mt-2 text-blue-100">
        Upload a PDF. Ask a question. Get a grounded answer.
      </p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-3xl mx-auto w-full p-6">

    <!-- Upload Section -->
    <section class="bg-white p-6 rounded-xl shadow mb-6">
      <label for="pdf-input" class="block text-lg font-semibold mb-3">
        Upload your notes (PDF)
      </label>

      <input
        type="file"
        id="pdf-input"
        accept="application/pdf"
        class="block w-full border border-gray-300 rounded-lg p-2"
      />

      <p id="upload-status" class="mt-3 text-sm text-gray-600"></p>
    </section>

    <!-- Question Section -->
    <section class="bg-white p-6 rounded-xl shadow mb-6">
      <label for="question" class="block text-lg font-semibold mb-3">
        Your Question
      </label>

      <textarea
        id="question"
        rows="4"
        placeholder="Type your question here..."
        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      ></textarea>

      <button
        id="ask-btn"
        type="button"
        class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition"
      >
        Submit
      </button>

      <p id="status" class="mt-3 text-sm text-gray-600"></p>
    </section>

    <!-- Answer Section -->
    <section
      id="answer"
      hidden
      class="bg-white p-6 rounded-xl shadow"
    >
      <h2 class="text-2xl font-bold mb-4">Answer</h2>

      <div class="flex gap-2 mb-4">
        <p
          id="qtype-pill"
          hidden
          class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm"
        ></p>

        <p
          id="tool-pill"
          hidden
          class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm"
        ></p>
      </div>

      <p id="answer-text" class="text-gray-800 leading-relaxed"></p>

      <!-- Sources -->
      <details id="sources" hidden class="mt-4">
        <summary class="cursor-pointer font-semibold text-blue-600">
          Sources
        </summary>

        <ul
          id="sources-list"
          class="list-disc list-inside mt-2 text-gray-700"
        ></ul>
      </details>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-gray-200 text-center py-4">
    <p>Built in the AI Engineering Bootcamp.</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
